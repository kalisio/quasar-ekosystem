<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link href="https://fonts.googleapis.com/css?family=Roboto:100,300,400,500,700,900|Material+Icons" rel="stylesheet" type="text/css">
    <link href="https://use.fontawesome.com/releases/v6.1.1/css/all.css" rel="stylesheet" type="text/css">
  </head>

  <body>
    <!-- HTML -->
    <div id="q-app">
      <q-layout view="lhh LpR lff">
        <q-header class="q-pa-md">
          <q-banner class="bg-primary text-white">
            <span class="text-h4">quasar-form</span>
            <template v-slot:avatar>
              <q-icon name="dynamic_form" color="white"></q-icon>
            </template>
            <template v-slot:action>
              <q-btn color="white" label="Edit"
                :flat="page !== 'edit'"
                :outline="page === 'edit'"
                @click="page = 'edit'"
              ></q-btn>
              <q-btn color="white" label="View"
                :flat="page !== 'view'"
                :outline="page === 'view'"
                @click="page = 'view'"
              ></q-btn>
              <q-btn color="white" label="Design"
                :flat="page !== 'design'"
                :outline="page === 'design'"
                @click="page = 'design'"
              ></q-btn>
            </template>
          </q-banner>
        </q-header>
        <q-page-container>
          <q-page padding>
            <form-page v-if="page === 'edit'"></form-page>
            <form-page v-if="page === 'view'" :read-only="true"></form-page>
            <design-page v-if="page === 'design'"></design-page>
          </q-page>
        </q-page-container>
      </q-layout>
    </div>

    <!-- SCRIPTS -->
    <script type="module">
      import { createApp, ref, defineComponent } from 'vue'
      import {
        Quasar, Notify,
        QLayout, QHeader, QBanner, QIcon, QBtn, QBtnToggle, QPageContainer, QPage,
        QCard, QCardSection, QSeparator, QForm, QExpansionItem,
        QInput, QSelect, QField, QSlider, QToggle, QColor, QDialog,
        QChip, QItem, QItemSection, QItemLabel
      } from 'quasar'
      import { createI18n } from 'vue-i18n'
      import 'quasar/dist/quasar.css'
      import { schemaRegistry } from '@kalisio/quasar-form'
      import FormPage from './components/form-page.js'
      import DesignPage from './components/design-page.js'

      schemaRegistry.initialize()

      const i18n = createI18n({
        legacy: false,
        locale: 'en',
        messages: { en: {} },
        missingWarn: false,
        fallbackWarn: false
      })

      const app = createApp({
        components: { FormPage, DesignPage },
        setup () {
          const page = ref('edit')
          return { page }
        }
      })
      app.component('KAction', defineComponent({ template: '<span></span>' }))
      app.use(Quasar, {
        plugins: { Notify },
        components: {
          QLayout, QHeader, QBanner, QIcon, QBtn, QBtnToggle, QPageContainer, QPage,
          QCard, QCardSection, QSeparator, QForm, QExpansionItem,
          QInput, QSelect, QField, QSlider, QToggle, QColor, QDialog,
          QChip, QItem, QItemSection, QItemLabel
        }
      })
      app.use(i18n)
      app.mount('#q-app')
    </script>
  </body>
</html>
